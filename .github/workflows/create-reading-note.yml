name: Create Reading Note Assets

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      issue_title:
        required: true
        type: string
      issue_body:
        required: true
        type: string
      issue_created_at:
        required: true
        type: string
      issue_labels:
        required: true
        type: string

jobs:
  create-branch-and-file:
    if: contains(inputs.issue_labels, 'reading-note')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      BRANCH_PREFIX: reading/issue-
      NOTE_DIRECTORY: source/_posts
      NOTE_TAG: reading-note
      NOTE_AUTHOR: Hsiang-Jen Li
      TEMPLATE_OWNER: hsiangjenli
      TEMPLATE_REPO: .github
      TEMPLATE_PATH: .github/templates/reading-note.md

    steps:
      - name: Create branch and note file
        id: prepare
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ inputs.issue_body }}
          ISSUE_CREATED_AT: ${{ inputs.issue_created_at }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const issueBody = process.env.ISSUE_BODY || '';
            const issueTitle = process.env.ISSUE_TITLE || `Issue #${issueNumber}`;
            const date = (process.env.ISSUE_CREATED_AT || '').slice(0, 10);
            const isbnMatch = issueBody.match(/^- ISBN：(.*?)$/m);
            const isbn = isbnMatch && isbnMatch[1] !== '<!-- 請填寫 -->'
              ? isbnMatch[1].trim()
              : 'unknown';

            const branch = `${process.env.BRANCH_PREFIX}${issueNumber}`;
            const filePath = `${process.env.NOTE_DIRECTORY}/note_${isbn}.md`;

            const { data: template } = await github.rest.repos.getContent({
              owner: process.env.TEMPLATE_OWNER,
              repo: process.env.TEMPLATE_REPO,
              path: process.env.TEMPLATE_PATH,
            });

            const templateContent = Buffer.from(template.content, 'base64').toString('utf8');
            const replacements = {
              '{{TITLE}}': issueTitle,
              '{{DATE}}': date,
              '{{UPDATED}}': date,
              '{{AUTHOR}}': process.env.NOTE_AUTHOR,
              '{{TAG}}': process.env.NOTE_TAG,
              '{{ISSUE_NUMBER}}': String(issueNumber),
              '{{ISBN}}': isbn,
            };

            const content = Object.entries(replacements).reduce(
              (result, [token, value]) => result.replaceAll(token, value),
              templateContent,
            );

            const { data: repository } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const { data: baseRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${repository.default_branch}`,
            });

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: baseRef.object.sha,
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch,
              path: filePath,
              message: `chore: init reading note for issue #${issueNumber} (ISBN: ${isbn})`,
              content: Buffer.from(content).toString('base64'),
            });

            core.setOutput('branch', branch);
            core.setOutput('file', filePath);

      - name: Comment on issue
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.prepare.outputs.branch }}
          FILE: ${{ steps.prepare.outputs.file }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }},
              body: `Created branch \`${process.env.BRANCH}\` and added the draft at \`${process.env.FILE}\`.\n\nOpen a PR with \`Closes #${{ inputs.issue_number }}\` to link and close this issue.`,
            });